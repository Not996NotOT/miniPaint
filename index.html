<!DOCTYPE html>
<html dir="ltr" lang="zh-CN">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta http-equiv="x-ua-compatible" content="IE=edge" />
	<title>toolcore - 类似于 PS 的在线图片编辑器</title>
	<meta name="description" content="toolcore 是一款类似 Photoshop 的在线图片编辑器，支持浏览器内图片编辑、图层处理、裁剪旋转、尺寸调整、滤镜特效、抠图擦除、文字和形状绘制，无需安装即可完成常用图片处理。" />
	<meta name="keywords" content="toolcore,在线图片编辑器,在线PS,类似Photoshop,图片处理,图片编辑,图层编辑,滤镜特效,裁剪图片,调整尺寸,抠图,在线修图,浏览器图片编辑工具" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />
	<meta name="robots" content="index, follow" />
	<link rel="canonical" href="https://toolcore.dev/" />
	<link rel="icon" sizes="192x192" href="images/favicon.png">
	<!-- <link rel="manifest" href="dist/manifest.json"> -->
	<!-- Google -->
	<meta itemprop="name" content="toolcore" />
	<meta itemprop="description" content="toolcore 是一款类似 Photoshop 的在线图片编辑器，支持图层、裁剪、滤镜、文字、形状绘制和常用图片处理功能。" />
	<meta itemprop="image" content="https://toolcore.dev/images/preview.jpg" />
	<!-- Twitter -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="toolcore - 类似于 PS 的在线图片编辑器" />
	<meta name="twitter:description" content="在线完成图片编辑、图层处理、裁剪旋转、尺寸调整、滤镜特效、文字和形状绘制。" />
	<meta name="twitter:image" content="https://toolcore.dev/images/preview.jpg" />
	<meta name="twitter:image:alt" content="toolcore 在线图片编辑器界面预览" />
	<!-- Facebook, Pinterest -->
	<meta property="og:title" content="toolcore - 类似于 PS 的在线图片编辑器" />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://toolcore.dev/" />
	<meta property="og:image" content="https://toolcore.dev/images/preview.jpg" />
	<meta property="og:description" content="toolcore 是一款浏览器在线图片编辑器，支持图层、裁剪旋转、滤镜特效、文字和形状绘制等常用图片处理功能。" />
	<meta property="og:site_name" content="toolcore" />
	
	<script src="dist/bundle.js"></script>
</head>
<body>
	<div class="wrapper">

		<nav aria-label="Main Menu" class="main_menu" id="main_menu"></nav>
		
		<div class="submenu">
			<div class="block attributes" id="action_attributes"></div>
			<button class="undo_button" id="undo_button" type="button">
				<span class="sr_only">Undo</span>
			</button>
		</div>
		
		<div class="sidebar_left" id="tools_container"></div>


		<div class="middle_area" id="middle_area">

			<canvas class="ruler_left" id="ruler_left"></canvas>
			<canvas class="ruler_top" id="ruler_top"></canvas>

			<div class="main_wrapper" id="main_wrapper">
				<div class="canvas_wrapper" id="canvas_wrapper">
					<div id="mouse"></div>
					<div class="transparent-grid" id="canvas_minipaint_background"></div>
					<canvas id="canvas_minipaint">
						<div class="trn error">
							Your browser does not support canvas or JavaScript is not enabled.
						</div>
					</canvas>
				</div>
			</div>
		</div>

		<div class="sidebar_right">
			<div class="preview block">
				<h2 class="trn toggle" data-target="toggle_preview">Preview</h2>
				<div id="toggle_preview"></div>
			</div>
			
			<div class="colors block">
				<h2 class="trn toggle" data-target="toggle_colors">Colors</h2>
				<div class="content" id="toggle_colors"></div>
			</div>
			
			<div class="block" id="info_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_info">Information</h2>
				<div class="content" id="toggle_info"></div>
			</div>
			
			<div class="details block" id="details_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_details">Layer details</h2>
				<div class="content details-content" id="toggle_details"></div>
			</div>
			
			<div class="layers block">
				<h2 class="trn">Layers</h2>
				<div class="content" id="layers_base"></div>
			</div>
		</div>
	</div>
	<div class="mobile_menu">
		<button class="left_mobile_menu" id="left_mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
		<button class="right_mobile_menu" id="mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
	</div>
	<div class="hidden" id="tmp"></div>
	<div id="popups"></div>
	<div class="toolcore_footer">
		<a href="https://toolcore.dev/" target="_blank" rel="noopener noreferrer">toolcore.dev 官网</a>
	</div>
</body>
</html>
